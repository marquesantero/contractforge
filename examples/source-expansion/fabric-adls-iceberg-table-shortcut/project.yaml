name: fabric_adls_iceberg_table_shortcut_source_smoke
description: Fabric source-expansion smoke for ADLS Gen2 Iceberg table shortcut reads.
default_environment: fabric

environments:
  fabric: environments/fabric.environment.yaml

fabric_setup:
  shortcuts:
    - path: Tables
      name: cf_fabric_adls_iceberg_orders
      conflict_policy: CreateOrOverwrite
      target:
        adlsGen2:
          location: https://cffabadls06131815.dfs.core.windows.net
          subpath: /cf-fabric-adls/source-expansion/iceberg-shortcut/iceberg_orders
          connectionId: "{{ parameter:fabric.connections.adls_shortcut_connection_id }}"

execution_order:
  - name: adls_iceberg_table_shortcut_orders
    layer: bronze
    expected_result: succeeded
    depends_on: []
    contracts:
      fabric: contracts/01_adls_iceberg_table_shortcut_orders.ingestion.yaml
  - name: adls_iceberg_table_shortcut_evidence_probe
    layer: bronze
    expected_result: succeeded
    depends_on: [adls_iceberg_table_shortcut_orders]
    contracts:
      fabric: contracts/02_adls_iceberg_table_shortcut_evidence_probe.ingestion.yaml

source_expansion:
  source_family: iceberg_table_shortcut
  shortcut_kind: external_adls_gen2_iceberg_table
  authentication: fabric_connection_key
  source_format: iceberg
  expected_success_steps: 2
  expected_probe_checks: 6
  stable_final_scope: stable_f11_adls_iceberg_table_shortcut_evidence
  fixture:
    generator: reused_pyiceberg_fixture_from_s3_iceberg_smoke
    rows: 3
    adls_prefix: abfss://cf-fabric-adls@cffabadls06131815.dfs.core.windows.net/source-expansion/iceberg-shortcut/iceberg_orders/
  shortcut:
    path: Tables
    name: cf_fabric_adls_iceberg_orders
    read_table: cf_fabric_adls_iceberg_orders
    target_type: AdlsGen2
    target_location: https://cffabadls06131815.dfs.core.windows.net
    target_subpath: /cf-fabric-adls/source-expansion/iceberg-shortcut/iceberg_orders
