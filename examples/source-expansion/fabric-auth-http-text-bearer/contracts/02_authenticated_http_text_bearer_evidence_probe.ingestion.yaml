source:
  type: sql
  query: |
    WITH checks AS (
      SELECT 'target_rows' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM cf_fabric_source_expansion.auth_http_text_bearer
      UNION ALL
      SELECT 'target_authenticated_payload' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM cf_fabric_source_expansion.auth_http_text_bearer
      WHERE value LIKE '%"authenticated": true%'
      UNION ALL
      SELECT 'run_rows' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM contractforge.ctrl_ingestion_runs
      WHERE target_table = 'cf_fabric_source_expansion.auth_http_text_bearer' AND status = 'SUCCESS'
      UNION ALL
      SELECT 'quality_rows' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM contractforge.ctrl_ingestion_quality
      WHERE target_table = 'cf_fabric_source_expansion.auth_http_text_bearer'
      UNION ALL
      SELECT 'schema_rows' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM contractforge.ctrl_ingestion_schema_changes
      WHERE target_table = 'cf_fabric_source_expansion.auth_http_text_bearer'
      UNION ALL
      SELECT 'source_metadata_rows' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM contractforge.ctrl_ingestion_metadata
      WHERE target_table = 'cf_fabric_source_expansion.auth_http_text_bearer'
    )
    SELECT check_name, observed_count, minimum_count
    FROM checks
    WHERE observed_count >= minimum_count
target:
  catalog: workspace
  schema: cf_fabric_source_expansion
  table: auth_http_text_bearer_evidence_probe
layer: bronze
mode: overwrite
quality_rules:
  required_columns: [check_name, observed_count, minimum_count]
  not_null: [check_name]
  min_rows: 6
