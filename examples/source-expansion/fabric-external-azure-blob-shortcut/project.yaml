name: fabric_external_azure_blob_shortcut_source_smoke
description: Fabric source-expansion smoke for external Azure Blob shortcut-backed CSV reads.
default_environment: fabric

environments:
  fabric: environments/fabric.environment.yaml

fabric_setup:
  shortcuts:
    - path: Files/source-expansion/external-azure-blob-shortcuts
      name: private_blob_orders
      conflict_policy: CreateOrOverwrite
      target:
        azureBlobStorage:
          location: https://cffabpriv65687.blob.core.windows.net
          subpath: /cf-fabric-private/object-storage
          connectionId: "{{ parameter:fabric.connections.azure_blob_shortcut_connection_id }}"

execution_order:
  - name: external_azure_blob_shortcut_orders
    layer: bronze
    expected_result: succeeded
    depends_on: []
    contracts:
      fabric: contracts/01_external_azure_blob_shortcut_orders.ingestion.yaml
  - name: external_azure_blob_shortcut_evidence_probe
    layer: bronze
    expected_result: succeeded
    depends_on: [external_azure_blob_shortcut_orders]
    contracts:
      fabric: contracts/02_external_azure_blob_shortcut_evidence_probe.ingestion.yaml

source_expansion:
  source_family: azure_blob_shortcut
  shortcut_kind: external_azure_blob
  authentication: fabric_connection_key
  source_format: csv
  expected_success_steps: 2
  expected_probe_checks: 6
  stable_final_scope: stable_f11_external_azure_blob_shortcut_evidence
  shortcut:
    path: Files/source-expansion/external-azure-blob-shortcuts
    name: private_blob_orders
    read_path: Files/source-expansion/external-azure-blob-shortcuts/private_blob_orders/orders.csv
    target_type: AzureBlobStorage
    target_location: https://cffabpriv65687.blob.core.windows.net
    target_subpath: /cf-fabric-private/object-storage

