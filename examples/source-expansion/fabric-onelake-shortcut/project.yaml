name: fabric_onelake_shortcut_source_smoke
description: Fabric source-expansion smoke for internal OneLake shortcut-backed Lakehouse file reads.
default_environment: fabric

environments:
  fabric: environments/fabric.environment.yaml

execution_order:
  - name: onelake_shortcut_orc_orders
    layer: bronze
    expected_result: succeeded
    depends_on: []
    contracts:
      fabric: contracts/01_onelake_shortcut_orc_orders.ingestion.yaml
  - name: onelake_shortcut_evidence_probe
    layer: bronze
    expected_result: succeeded
    depends_on: [onelake_shortcut_orc_orders]
    contracts:
      fabric: contracts/02_onelake_shortcut_evidence_probe.ingestion.yaml

source_expansion:
  source_family: onelake_shortcut
  shortcut_kind: internal_onelake_files
  source_format: orc
  expected_success_steps: 2
  expected_probe_checks: 5
  stable_final_scope: stable_f11_onelake_shortcut_evidence
  shortcut:
    path: Files/source-expansion/onelake-shortcuts
    name: source_expansion_shortcut
    read_path: Files/source-expansion/onelake-shortcuts/source_expansion_shortcut/lakehouse-file-formats/orc_orders
    target_path: Files/source-expansion
