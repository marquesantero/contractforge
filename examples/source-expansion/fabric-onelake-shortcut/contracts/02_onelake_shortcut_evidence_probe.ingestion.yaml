source:
  type: sql
  query: |
    WITH checks AS (
      SELECT 'shortcut_target_rows' AS check_name, COUNT(*) AS observed_count, 2 AS minimum_count
      FROM cf_fabric_source_expansion.onelake_shortcut_orc_orders
      UNION ALL
      SELECT 'shortcut_amount_sum' AS check_name, CAST(SUM(amount) AS BIGINT) AS observed_count, 30 AS minimum_count
      FROM cf_fabric_source_expansion.onelake_shortcut_orc_orders
      UNION ALL
      SELECT 'run_rows' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM contractforge.ctrl_ingestion_runs
      WHERE target_table = 'cf_fabric_source_expansion.onelake_shortcut_orc_orders' AND status = 'SUCCESS'
      UNION ALL
      SELECT 'quality_rows' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM contractforge.ctrl_ingestion_quality
      WHERE target_table = 'cf_fabric_source_expansion.onelake_shortcut_orc_orders'
      UNION ALL
      SELECT 'source_metadata_rows' AS check_name, COUNT(*) AS observed_count, 1 AS minimum_count
      FROM contractforge.ctrl_ingestion_metadata
      WHERE target_table = 'cf_fabric_source_expansion.onelake_shortcut_orc_orders'
    )
    SELECT check_name, observed_count, minimum_count
    FROM checks
    WHERE observed_count >= minimum_count
target:
  catalog: workspace
  schema: cf_fabric_source_expansion
  table: onelake_shortcut_evidence_probe
layer: bronze
mode: overwrite
quality_rules:
  required_columns: [check_name, observed_count, minimum_count]
  not_null: [check_name]
  min_rows: 5

