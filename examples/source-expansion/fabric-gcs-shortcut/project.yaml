name: fabric_gcs_shortcut_source_smoke
description: Fabric source-expansion smoke for external Google Cloud Storage shortcut-backed CSV reads.
default_environment: fabric

environments:
  fabric: environments/fabric.environment.yaml

fabric_setup:
  shortcuts:
    - path: Files/source-expansion/gcs-shortcuts
      name: gcs_orders
      conflict_policy: CreateOrOverwrite
      target:
        googleCloudStorage:
          location: https://contractforge-fabric-gcs-example-project-000000.storage.googleapis.com
          subpath: /source-expansion
          connectionId: "{{ parameter:fabric.connections.gcs_shortcut_connection_id }}"

execution_order:
  - name: gcs_shortcut_orders
    layer: bronze
    expected_result: succeeded
    depends_on: []
    contracts:
      fabric: contracts/01_gcs_shortcut_orders.ingestion.yaml
  - name: gcs_shortcut_evidence_probe
    layer: bronze
    expected_result: succeeded
    depends_on: [gcs_shortcut_orders]
    contracts:
      fabric: contracts/02_gcs_shortcut_evidence_probe.ingestion.yaml

source_expansion:
  source_family: gcs_shortcut
  shortcut_kind: external_google_cloud_storage
  authentication: fabric_connection_basic_hmac
  source_format: csv
  expected_success_steps: 2
  expected_probe_checks: 6
  stable_final_scope: stable_f11_gcs_shortcut_evidence
  shortcut:
    path: Files/source-expansion/gcs-shortcuts
    name: gcs_orders
    read_path: Files/source-expansion/gcs-shortcuts/gcs_orders/orders.csv
    target_type: GoogleCloudStorage
    target_location: https://contractforge-fabric-gcs-example-project-000000.storage.googleapis.com
    target_subpath: /source-expansion
