source:
  type: http_csv
  request:
    url: https://httpbingo.org/base64/b3JkZXJfaWQsYW1vdW50CjEsMTAKMiwyMAo=
    method: GET
    headers:
      Accept: text/csv
      User-Agent: ContractForge Fabric HTTP CSV source smoke
  options:
    header: "true"
  limits:
    timeout_seconds: 60
    retry_attempts: 3
    retry_backoff_seconds: 2
    max_bytes: 1048576
target:
  catalog: workspace
  schema: cf_fabric_source_expansion
  table: http_csv_orders
layer: bronze
mode: overwrite
schema_policy: permissive
quality_rules:
  required_columns: [order_id, amount]
  not_null: [order_id, amount]
  min_rows: 2
  expressions:
    - name: positive_amount
      expression: CAST(amount AS INT) > 0
      severity: abort

