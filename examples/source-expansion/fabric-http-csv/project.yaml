name: fabric_http_csv_source_smoke
description: Fabric source-expansion smoke for public bounded HTTP CSV reads.
default_environment: fabric

environments:
  fabric: environments/fabric.environment.yaml

execution_order:
  - name: http_csv_orders
    layer: bronze
    expected_result: succeeded
    depends_on: []
    contracts:
      fabric: contracts/01_http_csv_orders.ingestion.yaml
  - name: http_csv_evidence_probe
    layer: bronze
    expected_result: succeeded
    depends_on: [http_csv_orders]
    contracts:
      fabric: contracts/02_http_csv_evidence_probe.ingestion.yaml

source_expansion:
  source_family: http_csv
  authentication: none
  expected_success_steps: 2
  expected_probe_checks: 5
  stable_final_scope: stable_f11_public_http_csv_evidence

