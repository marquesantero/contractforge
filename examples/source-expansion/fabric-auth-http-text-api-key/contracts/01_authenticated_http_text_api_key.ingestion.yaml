source:
  type: http_text
  request:
    url: https://cf-fabric-apikey-65687.azurewebsites.net/api/contractforge-http-text-api-key
    method: GET
    headers:
      Accept: text/plain
      User-Agent: ContractForge Fabric authenticated HTTP text API-key source smoke
  auth:
    type: api_key
    header: x-api-key
    value: "{{ secret:fabric/rest-api-key }}"
  limits:
    timeout_seconds: 60
    retry_attempts: 3
    retry_backoff_seconds: 2
    max_bytes: 1048576
target:
  catalog: workspace
  schema: cf_fabric_source_expansion
  table: auth_http_text_api_key
layer: bronze
mode: overwrite
schema_policy: permissive
quality_rules:
  required_columns: [value]
  not_null: [value]
  min_rows: 1
  expressions:
    - name: authenticated_payload
      expression: value = 'contractforge_api_key_authenticated=true'
      severity: abort
