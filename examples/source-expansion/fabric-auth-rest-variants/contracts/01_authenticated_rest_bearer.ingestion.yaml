source:
  type: rest_api
  request:
    url: https://postman-echo.com/get
    method: GET
    headers:
      Accept: application/json
      User-Agent: ContractForge Fabric bearer REST source smoke
  auth:
    type: bearer_token
    token: "{{ secret:fabric/rest-bearer-token }}"
  response:
    records_path: headers
  limits:
    timeout_seconds: 60
    retry_attempts: 3
    retry_backoff_seconds: 2
    max_page_bytes: 1048576
    max_total_bytes: 1048576
    max_records: 10
target:
  catalog: workspace
  schema: cf_fabric_source_expansion
  table: auth_rest_bearer
layer: bronze
mode: overwrite
schema_policy: permissive
quality_rules:
  required_columns: [authorization]
  not_null: [authorization]
  min_rows: 1
  expressions:
    - name: bearer_header_present
      expression: authorization LIKE 'Bearer %'
      severity: abort
