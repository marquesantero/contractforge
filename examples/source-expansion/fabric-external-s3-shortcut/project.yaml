name: fabric_external_s3_shortcut_source_smoke
description: Fabric source-expansion smoke for external Amazon S3 shortcut-backed CSV reads.
default_environment: fabric

environments:
  fabric: environments/fabric.environment.yaml

fabric_setup:
  shortcuts:
    - path: Files/source-expansion/external-s3-shortcuts
      name: s3_orders
      conflict_policy: CreateOrOverwrite
      target:
        amazonS3:
          location: https://contractforge-aws-smoke-449112696824-us-east-1.s3.us-east-1.amazonaws.com
          subpath: /source-expansion/fabric-s3-shortcut
          connectionId: "{{ parameter:fabric.connections.amazon_s3_shortcut_connection_id }}"

execution_order:
  - name: external_s3_shortcut_orders
    layer: bronze
    expected_result: succeeded
    depends_on: []
    contracts:
      fabric: contracts/01_external_s3_shortcut_orders.ingestion.yaml
  - name: external_s3_shortcut_evidence_probe
    layer: bronze
    expected_result: succeeded
    depends_on: [external_s3_shortcut_orders]
    contracts:
      fabric: contracts/02_external_s3_shortcut_evidence_probe.ingestion.yaml

source_expansion:
  source_family: s3_shortcut
  shortcut_kind: external_amazon_s3
  authentication: fabric_connection_basic_iam_user
  source_format: csv
  expected_success_steps: 2
  expected_probe_checks: 6
  stable_final_scope: stable_f11_external_s3_shortcut_evidence
  shortcut:
    path: Files/source-expansion/external-s3-shortcuts
    name: s3_orders
    read_path: Files/source-expansion/external-s3-shortcuts/s3_orders/orders.csv
    target_type: AmazonS3
    target_location: https://contractforge-aws-smoke-449112696824-us-east-1.s3.us-east-1.amazonaws.com
    target_subpath: /source-expansion/fabric-s3-shortcut
