source:
  type: rest_api
  request:
    url: https://postman-echo.com/headers
    method: GET
    headers:
      Accept: application/json
      User-Agent: ContractForge GCP REST bearer source smoke
  auth:
    type: bearer_token
    token: "{{ secret:gcp/rest-bearer-token }}"
  response:
    records_path: headers.authorization
  limits:
    timeout_seconds: 60
    retry_attempts: 3
    retry_backoff_seconds: 2
    max_page_bytes: 1048576
    max_total_bytes: 1048576
    max_records: 10
  read:
    columns:
      - name: value
        type: STRING
target:
  catalog: gcp-project-redacted
  schema: contractforge_gcp_smoke
  table: cf_auth_rest_bearer
mode: overwrite
quality_rules:
  not_null:
    - value
