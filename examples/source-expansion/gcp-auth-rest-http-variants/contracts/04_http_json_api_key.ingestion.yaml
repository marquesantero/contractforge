source:
  type: http_json
  request:
    url: https://postman-echo.com/headers
    headers:
      Accept: application/json
      User-Agent: ContractForge GCP HTTP JSON API-key source smoke
  auth:
    type: api_key
    header: X-Api-Key
    value: "{{ secret:gcp/http-api-key }}"
  response:
    records_path: headers.x-api-key
  limits:
    timeout_seconds: 60
    retry_attempts: 3
    retry_backoff_seconds: 2
    max_bytes: 1048576
  read:
    columns:
      - name: value
        type: STRING
target:
  catalog: midyear-system-499521-p3
  schema: contractforge_gcp_smoke
  table: cf_auth_http_json_api_key
mode: overwrite
quality_rules:
  not_null:
    - value
