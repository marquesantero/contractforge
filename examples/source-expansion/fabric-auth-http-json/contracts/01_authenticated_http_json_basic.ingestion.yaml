source:
  type: http_json
  request:
    url: https://postman-echo.com/basic-auth
    method: GET
    headers:
      Accept: application/json
      User-Agent: ContractForge Fabric authenticated HTTP JSON source smoke
  auth:
    type: basic
    username: postman
    password: "{{ secret:fabric/postman-basic-password }}"
  options:
    multiLine: "true"
  limits:
    timeout_seconds: 60
    retry_attempts: 3
    retry_backoff_seconds: 2
    max_bytes: 1048576
target:
  catalog: workspace
  schema: cf_fabric_source_expansion
  table: auth_http_json_basic
layer: bronze
mode: overwrite
schema_policy: permissive
quality_rules:
  required_columns: [authenticated]
  not_null: [authenticated]
  min_rows: 1
  expressions:
    - name: authenticated_true
      expression: authenticated = true
      severity: abort
