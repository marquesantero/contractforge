bundle:
  name: contractforge_usgs_earthquake_rest_medallion
resources:
  jobs:
    usgs_earthquake_rest_medallion:
      name: contractforge_usgs_earthquake_rest_medallion
      schedule:
        quartz_cron_expression: 0 0 6 * * ?
        timezone_id: America/Sao_Paulo
        pause_status: PAUSED
      environments:
      - environment_key: contractforge_runtime
        spec:
          environment_version: '2'
          dependencies:
          - ${var.core_wheel_path}
          - ${var.databricks_wheel_path}
      tasks:
      - task_key: bronze_usgs_geojson
        environment_key: contractforge_runtime
        notebook_task:
          notebook_path: ./notebooks/run_contractforge.py
          base_parameters:
            bundle_root: ${var.bundle_root}
            contract: contracts/databricks/bronze/bronze_usgs_geojson/bronze_usgs_geojson.ingestion.yaml
            evidence_catalog: ${var.evidence_catalog}
            evidence_schema: ${var.evidence_schema}
      - task_key: silver_usgs_events
        environment_key: contractforge_runtime
        depends_on:
        - task_key: bronze_usgs_geojson
        notebook_task:
          notebook_path: ./notebooks/run_contractforge.py
          base_parameters:
            bundle_root: ${var.bundle_root}
            contract: contracts/databricks/silver/silver_usgs_events/silver_usgs_events.ingestion.yaml
            evidence_catalog: ${var.evidence_catalog}
            evidence_schema: ${var.evidence_schema}
      - task_key: gold_usgs_daily_summary
        environment_key: contractforge_runtime
        depends_on:
        - task_key: silver_usgs_events
        notebook_task:
          notebook_path: ./notebooks/run_contractforge.py
          base_parameters:
            bundle_root: ${var.bundle_root}
            contract: contracts/databricks/gold/gold_usgs_daily_summary/gold_usgs_daily_summary.ingestion.yaml
            evidence_catalog: ${var.evidence_catalog}
            evidence_schema: ${var.evidence_schema}
      - task_key: gold_usgs_magnitude_bands
        environment_key: contractforge_runtime
        depends_on:
        - task_key: silver_usgs_events
        notebook_task:
          notebook_path: ./notebooks/run_contractforge.py
          base_parameters:
            bundle_root: ${var.bundle_root}
            contract: contracts/databricks/gold/gold_usgs_magnitude_bands/gold_usgs_magnitude_bands.ingestion.yaml
            evidence_catalog: ${var.evidence_catalog}
            evidence_schema: ${var.evidence_schema}
targets:
  dev:
    default: true
workspace:
  root_path: /Workspace/Shared/contractforge-examples/USGS_REST_Medallion
variables:
  bundle_root:
    default: /Workspace/Shared/contractforge-examples/USGS_REST_Medallion/files
  core_wheel_path:
    default: /Workspace/Shared/contractforge-examples/libs/contractforge_core-0.1.0-py3-none-any.whl
  databricks_wheel_path:
    default: /Workspace/Shared/contractforge-examples/libs/contractforge_databricks-0.1.0-py3-none-any.whl
  evidence_catalog:
    default: workspace
  evidence_schema:
    default: cf_usgs_rest_ops
