policy: warn
table:
  description: Product master data ingested from Supabase PostgreSQL.
  tags:
    domain: inventory
    source: supabase
    layer: bronze
columns:
  product_id:
    description: Product surrogate key from Supabase.
  sku:
    description: Product SKU.
  brand:
    description: Product brand standardized during ingest.
  price_amount:
    description: Product price amount.
  tags_json:
    description: JSON array of source product tags.
  attributes_json:
    description: JSON object with source product attributes.
  updated_at:
    description: Source update timestamp used for change detection.
